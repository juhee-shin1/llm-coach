apiVersion: v1
kind: Namespace
metadata:
  name: llm-coach
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: oom-app
  namespace: llm-coach
spec:
  replicas: 1
  selector:
    matchLabels:
      app: oom-app
  template:
    metadata:
      labels:
        app: oom-app
    spec:
      containers:
      - name: app
        image: nginx:stable
        resources:
          requests:
            memory: "4Mi"
            cpu: "50m"
          limits:
            memory: "4Mi"   # 너무 낮아서 OOMKilled 유발
            cpu: "100m"
